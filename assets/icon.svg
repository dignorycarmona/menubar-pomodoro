<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- calyx: 5-petal leaf fan -->
  <g fill="#3FA34D">
    <g transform="translate(100,66) rotate(-60)">
      <path d="M0,0 C -8,-14 -6,-30 0,-34 C 6,-30 8,-14 0,0 Z"/>
    </g>
    <g transform="translate(100,66) rotate(-30)">
      <path d="M0,0 C -8,-14 -6,-30 0,-34 C 6,-30 8,-14 0,0 Z"/>
    </g>
    <g transform="translate(100,66) rotate(0)">
      <path d="M0,0 C -8,-14 -6,-30 0,-34 C 6,-30 8,-14 0,0 Z"/>
    </g>
    <g transform="translate(100,66) rotate(30)">
      <path d="M0,0 C -8,-14 -6,-30 0,-34 C 6,-30 8,-14 0,0 Z"/>
    </g>
    <g transform="translate(100,66) rotate(60)">
      <path d="M0,0 C -8,-14 -6,-30 0,-34 C 6,-30 8,-14 0,0 Z"/>
    </g>
  </g>

  <!-- tomato body -->
  <circle cx="100" cy="132" r="62" fill="#E6453A"/>

  <!-- gloss -->
  <path d="M 66 100 C 60 116, 60 138, 68 154" stroke="#F2857A" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- clock hands: the one nod to "timer" -->
  <line x1="100" y1="132" x2="100" y2="102" stroke="#FBEDEA" stroke-width="7" stroke-linecap="round"/>
  <line x1="100" y1="132" x2="122" y2="132" stroke="#FBEDEA" stroke-width="7" stroke-linecap="round"/>
  <circle cx="100" cy="132" r="6" fill="#FBEDEA"/>
</svg>
